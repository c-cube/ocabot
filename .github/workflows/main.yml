name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - ocaml-version: "5.1"
            container: ghcr.io/c-cube/c-cube-commmon/ci-5.1:latest
          - ocaml-version: "5.4"
            container: ghcr.io/c-cube/c-cube-commmon/ci-5.4:latest

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v6
      - run: opam install -t ./ocabot.opam --deps-only
      - run: opam exec -- dune build '@install'
      - run: opam exec -- dune runtest --force

  format:
    name: format
    runs-on: ubuntu-latest
    container: ghcr.io/c-cube/c-cube-commmon/ci-doc-5.3:latest

    steps:
      - uses: actions/checkout@v6
      - run: opam exec -- make format-check
